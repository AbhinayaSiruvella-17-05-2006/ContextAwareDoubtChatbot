<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpg" href="/oil2.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oilwise</title>

  <style>
    body {
      top: 0 !important;
      margin: 0 !important;
      padding: 0 !important;
    }

    /* Hide Google tooltip + branding */
    #goog-gt-tt,
    .goog-te-balloon-frame,
    .goog-logo-link,
    .goog-te-gadget img {
      display: none !important;
    }

    /* DropDown style */
    .goog-te-gadget .goog-te-combo {
      font-size: 14px !important;
      padding: 4px 6px;
      border-radius: 6px;
      background: #ffffff !important;
      color: #000000 !important;
      border: 1px solid #ccc !important;
      cursor: pointer;
    }

    /* Rectangle cover image */
    #googleTranslateCover {
      position: fixed;
      top: 0;
      left: 0;
      width: 500px;
      height: 30px;
      object-fit: cover;
      background: transparent;
      z-index: 999999999;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <!-- COVER IMAGE -->
  <img id="googleTranslateCover" src="/rectangle1.png" alt="" />

  <!-- LANGUAGE DROPDOWN -->
  <div
    id="google_translate_element"
    style="
      position: fixed;
      top: 5px;
      right: 20px;
      z-index: 99999999;
      background: rgba(255,255,255,0.95);
      padding: 4px 6px;
      border-radius: 6px;
      box-shadow: 0 0 6px rgba(0,0,0,0.2);
    "
  ></div>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <!-- INIT GOOGLE TRANSLATE -->
  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement(
        {
          pageLanguage: "en",
          includedLanguages: "",
          autoDisplay: true,
        },
        "google_translate_element"
      );
    }
  </script>

  <!-- REMOVE TOP BANNER -->
  <script>
    function hideGoogleBanner() {
      const frame = document.querySelector(".goog-te-banner-frame");
      if (frame) frame.remove();

      document.body.style.top = "0px";
      document.documentElement.style.top = "0px";
    }

    window.addEventListener("load", hideGoogleBanner);

    new MutationObserver(hideGoogleBanner)
      .observe(document.body, { childList: true, subtree: true });
  </script>

  <!-- REMOVE POWERED BY + REPLACE TEXT INSIDE DROPDOWN -->
  <script>
    function fixTranslateMenu() {
      let iframe = document.querySelector(".goog-te-menu-frame");

      if (!iframe) return;

      let inner = iframe.contentDocument || iframe.contentWindow.document;
      if (!inner) return;

      // Replace "Powered by Google Translate" with "Select Language"
      const listItems = inner.querySelectorAll(".goog-te-menu2-item span.text");

      listItems.forEach(span => {
        if (span.innerText.includes("Powered")) {
          span.innerText = "Select Language";
          span.style.opacity = "1";
          span.style.fontWeight = "600";
          span.style.color = "#000";
        }
      });

      // Remove extra Google icon/header rows
      let unwanted = inner.querySelectorAll(".goog-te-menu2-item div");
      unwanted.forEach(div => {
        if (div.innerText.includes("Translate")) div.style.display = "none";
      });
    }

    // Keep checking until the dropdown loads
    setInterval(fixTranslateMenu, 300);
  </script>

  <!-- GOOGLE TRANSLATE SCRIPT -->
  <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
